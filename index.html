<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CoC Stable</title>

<style>
body {
  margin:0;
  font-family: system-ui;
  background:#0b0f14;
  color:#e6eef7;
}

#top {
  padding:10px;
  background:#111826;
}

#log {
  padding:10px;
  height:60vh;
  overflow:auto;
  background:#0f1621;
}

button {
  margin:5px;
  padding:8px;
  background:#1d2a35;
  color:white;
  border:1px solid #2c3e50;
}

input {
  width:95%;
  padding:10px;
  margin:10px;
}
</style>
</head>

<body>

<div id="top">
  <b>CoC Stable Version</b>
</div>

<div id="log"></div>

<input id="input" placeholder="输入行动..." />
<button onclick="act()">行动</button>

<div id="choices"></div>

<script>

/* =========================
   🛡️ 永不白屏核心结构
========================= */

let state = {
  log: [],
  hp: 12,
  san: 60
};

const logBox = document.getElementById("log");
const choiceBox = document.getElementById("choices");
const inputBox = document.getElementById("input");

/* =========================
   安全日志
========================= */
function add(text) {
  try {
    state.log.push(text);

    if (logBox) {
      const d = document.createElement("div");
      d.innerText = text;
      logBox.appendChild(d);
      logBox.scrollTop = logBox.scrollHeight;
    }
  } catch (e) {
    console.log("log error", e);
  }
}

/* =========================
   AI（本地稳定版）
========================= */
function AI(action) {
  if (!action) return "你什么也没做。";

  if (action.includes("门")) return "门后传来潮湿气味。";
  if (action.includes("检查")) return "你看到模糊的血迹。";

  return "走廊安静得不自然。";
}

/* =========================
   行动系统（防崩）
========================= */
function act(choice) {
  try {

    const action = choice || (inputBox ? inputBox.value : "");

    add("你：" + action);

    const result = AI(action);

    add(result);

    renderChoices();

    if (inputBox) inputBox.value = "";

  } catch (e) {
    console.log("act error", e);
    add("系统异常，但游戏继续运行");
  }
}

/* =========================
   选项
========================= */
function renderChoices() {
  try {
    if (!choiceBox) return;

    choiceBox.innerHTML = "";

    ["环顾四周", "检查墙壁", "打开门"].forEach(c => {
      const b = document.createElement("button");
      b.innerText = c;
      b.onclick = () => act(c);
      choiceBox.appendChild(b);
    });

  } catch (e) {
    console.log("choice error", e);
  }
}

/* =========================
   启动保护
========================= */
function init() {
  try {
    add("你醒来，四周一片黑暗。");
    renderChoices();
  } catch (e) {
    console.log("init error", e);
  }
}

window.onload = init;

</script>

</body>
</html>
